name: Generar ejecutable de Windows

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Obtener el código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Generar gesaula.exe
        shell: pwsh
        run: ./scripts/build_windows.ps1

      - name: Publicar el ejecutable
        uses: actions/upload-artifact@v4
        with:
          name: gesaula-windows-x64
          path: dist/windows/gesaula.exe
          if-no-files-found: error
